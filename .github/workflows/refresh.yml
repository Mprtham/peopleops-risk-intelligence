name: Gated Power BI Refresh

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  dbt-build-and-refresh:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install dbt-bigquery==1.8.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          peopleops:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: ${{ secrets.GCP_PROJECT }}
                dataset: peopleops_prod
                threads: 4
                timeout_seconds: 300
                location: US
          EOF

      - name: dbt build (run + test)
        working-directory: dbt
        run: dbt build --target prod
        # If any test fails, this step fails and the refresh step below is skipped.

      - name: Trigger Power BI dataset refresh
        if: success()
        env:
          PBI_CLIENT_ID: ${{ secrets.PBI_CLIENT_ID }}
          PBI_CLIENT_SECRET: ${{ secrets.PBI_CLIENT_SECRET }}
          PBI_TENANT_ID: ${{ secrets.PBI_TENANT_ID }}
          PBI_WORKSPACE_ID: ${{ secrets.PBI_WORKSPACE_ID }}
          PBI_DATASET_ID: ${{ secrets.PBI_DATASET_ID }}
        run: |
          TOKEN=$(curl -s -X POST \
            "https://login.microsoftonline.com/${PBI_TENANT_ID}/oauth2/v2.0/token" \
            -d "grant_type=client_credentials" \
            -d "client_id=${PBI_CLIENT_ID}" \
            -d "client_secret=${PBI_CLIENT_SECRET}" \
            -d "scope=https://analysis.windows.net/powerbi/api/.default" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.powerbi.com/v1.0/myorg/groups/${PBI_WORKSPACE_ID}/datasets/${PBI_DATASET_ID}/refreshes" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "Power BI refresh API status: ${HTTP_STATUS}"
          if [ "${HTTP_STATUS}" != "202" ]; then
            echo "Refresh request failed with status ${HTTP_STATUS}"
            exit 1
          fi
          echo "Refresh triggered successfully — dashboard cannot refresh on bad data."
